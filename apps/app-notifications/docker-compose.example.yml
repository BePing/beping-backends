version: '3.8'

services:
  app-notifications:
    build:
      context: .
      dockerfile: apps/app-notifications/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/tabt_db
      - DIRECT_URL=postgresql://postgres:password@postgres:5432/tabt_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3002
      - FIREBASE_SERVICE_ACCOUNT_KEY_PATH=/app/firebase-key.json
    volumes:
      - ./firebase-service-account-key.json:/app/firebase-key.json:ro
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=tabt_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data: 