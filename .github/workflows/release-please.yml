name: Release Please

on:
  push:
    branches:
      - main
      - release/*

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  REGISTRY_HOST: ${{ vars.HETZNER_REGISTRY_HOST }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
      tabt-rest--release_created: ${{ steps.release.outputs['apps/tabt-rest--release_created'] }}
      tabt-rest--tag_name: ${{ steps.release.outputs['apps/tabt-rest--tag_name'] }}
      data-aftt-importer--release_created: ${{ steps.release.outputs['apps/data-aftt-importer--release_created'] }}
      data-aftt-importer--tag_name: ${{ steps.release.outputs['apps/data-aftt-importer--tag_name'] }}
      app-notifications--release_created: ${{ steps.release.outputs['apps/app-notifications--release_created'] }}
      app-notifications--tag_name: ${{ steps.release.outputs['apps/app-notifications--tag_name'] }}
    steps:
      - uses: actions/checkout@v7

      - name: Run Release Please
        id: release
        uses: google-github-actions/release-please-action@v4.1.1
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main
          token: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: tabt-rest
            release_created: ${{ needs.release-please.outputs.tabt-rest--release_created }}
            tag_name: ${{ needs.release-please.outputs.tabt-rest--tag_name }}
            image_name: ${{ vars.HETZNER_REGISTRY_HOST }}/escape-key/beping-api
          - app: data-aftt-importer
            release_created: ${{ needs.release-please.outputs.data-aftt-importer--release_created }}
            tag_name: ${{ needs.release-please.outputs.data-aftt-importer--tag_name }}
            image_name: ${{ vars.HETZNER_REGISTRY_HOST }}/escape-key/beping-importer
          - app: app-notifications
            release_created: ${{ needs.release-please.outputs.app-notifications--release_created }}
            tag_name: ${{ needs.release-please.outputs.app-notifications--tag_name }}
            image_name: ${{ vars.HETZNER_REGISTRY_HOST }}/escape-key/beping-notifications
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Escape Key registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.HETZNER_REGISTRY_USERNAME }}
          password: ${{ secrets.HETZNER_REGISTRY_PASSWORD }}

      - name: Extract version from tag
        if: matrix.release_created == 'true'
        id: version
        run: |
          VERSION=$(echo "${{ matrix.tag_name }}" | sed 's/.*-v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }},enable=${{ matrix.release_created == 'true' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }},enable=${{ matrix.release_created == 'true' }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.version }},enable=${{ matrix.release_created == 'true' }}
            type=raw,value=latest,enable=${{ matrix.release_created == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  # Shared run-once migration image (init step). Rebuilt on any release so the
  # schema engine + prisma/ migrations stay in sync with the deployed apps.
  build-and-push-migrate:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Escape Key registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.HETZNER_REGISTRY_USERNAME }}
          password: ${{ secrets.HETZNER_REGISTRY_PASSWORD }}

      - name: Build and push migrate image
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          file: ./Dockerfile.migrate
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY_HOST }}/escape-key/beping-migrate:${{ github.sha }}
          cache-from: type=gha,scope=beping-migrate
          cache-to: type=gha,mode=max,scope=beping-migrate

  deploy-production:
    needs:
      - release-please
      - build-and-push
      - build-and-push-migrate
    if: >-
      ${{
        always() &&
        github.ref == 'refs/heads/main' &&
        needs.release-please.outputs.releases_created == 'true' &&
        needs.build-and-push.result == 'success' &&
        needs.build-and-push-migrate.result == 'success'
      }}
    uses: ./.github/workflows/deploy-production.yml
    with:
      image_sha: ${{ github.sha }}
    secrets: inherit
