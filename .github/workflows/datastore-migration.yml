name: Manage production datastores

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Safe datastore operation
        required: true
        type: choice
        options:
          - inventory
          - backup-inventory
          - configure-postgres-backup
          - provision
      project_uuid:
        description: Coolify project UUID (required for provision)
        required: false
        type: string
      environment_name:
        description: Coolify environment name
        required: true
        default: production
        type: string
      server_uuid:
        description: BePing Coolify server UUID
        required: true
        default: c8ccokg44sw4ksow8048ksok
        type: string

permissions:
  contents: read

concurrency:
  group: beping-production
  cancel-in-progress: false

jobs:
  manage:
    name: ${{ inputs.operation }} production datastores
    runs-on: [self-hosted, linux, x64, escape-key-ci]
    environment: Production
    timeout-minutes: 20
    env:
      COOLIFY_URL: ${{ vars.COOLIFY_URL }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
      POSTGRES_PASSWORD: ${{ secrets.BEPING_PG18_PASSWORD }}
      REDIS_PASSWORD: ${{ secrets.BEPING_REDIS8_PASSWORD }}
      POSTGRES_UUID: ${{ vars.COOLIFY_BEPING_POSTGRES18_UUID }}
      LEGACY_POSTGRES_UUID: jkz4iipmqv48zeeq9soyvtqz
    steps:
      - name: Validate configuration
        run: |
          test -n "${COOLIFY_URL}"
          test -n "${COOLIFY_TOKEN}"
          [[ "${{ inputs.server_uuid }}" =~ ^[a-z0-9]+$ ]]

      - name: Inventory Coolify resources
        if: inputs.operation == 'inventory'
        run: |
          coolify_get() {
            curl --fail-with-body --silent --show-error \
              --connect-timeout 10 \
              --max-time 30 \
              -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              "${COOLIFY_URL%/}/api/v1/$1"
          }

          echo 'Servers:'
          coolify_get servers | jq '[.[] | {uuid, name, is_reachable, is_usable}]'

          echo 'Projects and environments:'
          while IFS= read -r project_uuid; do
            coolify_get "projects/${project_uuid}" \
              | jq '{uuid, name, environments: [.environments[] | {uuid, name}]}'
          done < <(coolify_get projects | jq -r '.[].uuid')

          echo 'Datastores:'
          coolify_get databases \
            | jq '[.[] | {uuid, name, database_type, image, status, environment_id, destination_id}]'

      - name: Inventory PostgreSQL 18 backups
        if: inputs.operation == 'backup-inventory'
        run: |
          test -n "${POSTGRES_UUID}"
          [[ "${POSTGRES_UUID}" =~ ^[a-z0-9]+$ ]]

          for database_uuid in "${POSTGRES_UUID}" "${LEGACY_POSTGRES_UUID}"; do
            echo "Backup configuration for ${database_uuid}:"
            curl --fail-with-body --silent --show-error \
              --connect-timeout 10 \
              --max-time 30 \
              -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              "${COOLIFY_URL%/}/api/v1/databases/${database_uuid}/backups" \
              | jq '[.[] | {
                uuid,
                enabled,
                frequency,
                save_s3,
                s3_storage_id,
                databases_to_backup,
                timeout,
                database_backup_retention_amount_locally,
                database_backup_retention_days_locally,
                database_backup_retention_max_storage_locally,
                executions: [.executions[:5][]? | {uuid, status, created_at, finished_at, s3_uploaded}]
              }]'
          done

      - name: Configure PostgreSQL 18 backups
        if: inputs.operation == 'configure-postgres-backup'
        run: |
          test -n "${POSTGRES_UUID}"
          [[ "${POSTGRES_UUID}" =~ ^[a-z0-9]+$ ]]

          coolify_request() {
            local method="$1"
            local path="$2"
            local payload="${3:-}"
            local args=(
              --fail-with-body
              --silent
              --show-error
              --connect-timeout 10
              --max-time 60
              -X "${method}"
              -H "Authorization: Bearer ${COOLIFY_TOKEN}"
              -H 'Content-Type: application/json'
            )
            if [[ -n "${payload}" ]]; then
              args+=(--data "${payload}")
            fi
            curl "${args[@]}" "${COOLIFY_URL%/}/api/v1/${path}"
          }

          backups="$(coolify_request GET "databases/${POSTGRES_UUID}/backups")"
          backup_uuid="$(jq -r '.[0].uuid // empty' <<<"${backups}")"
          legacy_backups="$(coolify_request GET "databases/${LEGACY_POSTGRES_UUID}/backups")"
          legacy_s3_id="$(
            jq -r '[.[] | select(.save_s3 == true and .s3_storage_id != null)][0].s3_storage_id // empty' \
              <<<"${legacy_backups}"
          )"

          test -n "${legacy_s3_id}"
          [[ "${legacy_s3_id}" =~ ^[0-9]+$ ]]

          # Coolify v4.1 exposes the storage's numeric relation on backup
          # configurations but accepts its public UUID on writes. Resolve that
          # UUID read-only from the control-plane database on the protected
          # self-hosted runner; credentials never leave the database container.
          coolify_db_container="$(
            docker ps --filter name=coolify-db --format '{{.Names}}' | head -n1
          )"
          if [[ -n "${coolify_db_container}" ]]; then
            echo 'Resolving the S3 storage on the local Coolify control plane.'
            s3_storage_uuid="$(
              docker exec "${coolify_db_container}" \
                psql -U coolify -d coolify -At \
                -c "SELECT uuid FROM s3_storages WHERE id = ${legacy_s3_id};"
            )"
          else
            echo 'Resolving the S3 storage through the private control-plane SSH endpoint.'
            control_plane_host="$(
              sed -E 's#^https?://([^:/]+).*#\1#' <<<"${COOLIFY_URL}"
            )"
            [[ "${control_plane_host}" =~ ^[0-9a-fA-F:.]+$ ]]
            s3_storage_uuid="$(
              ssh \
                -o BatchMode=yes \
                -o ConnectTimeout=10 \
                -o StrictHostKeyChecking=yes \
                "root@${control_plane_host}" \
                "docker exec coolify-db psql -U coolify -d coolify -At -c 'SELECT uuid FROM s3_storages WHERE id = ${legacy_s3_id};'"
            )"
          fi
          [[ "${s3_storage_uuid}" =~ ^[a-z0-9]+$ ]]

          backup_payload="$(
            jq -n \
              --arg s3_storage_uuid "${s3_storage_uuid}" \
              '{
                enabled: true,
                save_s3: true,
                s3_storage_uuid: $s3_storage_uuid,
                backup_now: true,
                database_backup_retention_amount_s3: 14,
                database_backup_retention_days_s3: 30,
                database_backup_retention_max_storage_s3: 25
              }'
          )"

          if [[ -n "${backup_uuid}" ]]; then
            [[ "${backup_uuid}" =~ ^[a-z0-9]+$ ]]
            coolify_request PATCH \
              "databases/${POSTGRES_UUID}/backups/${backup_uuid}" \
              "${backup_payload}" \
              | jq '{uuid, message}'
          else
            create_payload="$(
              jq \
                '. + {
                  frequency: "17 2 * * *",
                  databases_to_backup: "beping",
                  database_backup_retention_amount_locally: 7,
                  database_backup_retention_days_locally: 7,
                  database_backup_retention_max_storage_locally: 5,
                  timeout: 3600
                }' <<<"${backup_payload}"
            )"
            coolify_request POST "databases/${POSTGRES_UUID}/backups" "${create_payload}" \
              | jq '{uuid, message}'
          fi

          echo 'Effective backup configuration:'
          coolify_request GET "databases/${POSTGRES_UUID}/backups" \
            | jq '[.[] | {
                uuid,
                enabled,
                frequency,
                save_s3,
                s3_storage_id,
                databases_to_backup,
                timeout,
                database_backup_retention_amount_locally,
                database_backup_retention_days_locally,
                database_backup_retention_max_storage_locally,
                database_backup_retention_amount_s3,
                database_backup_retention_days_s3,
                database_backup_retention_max_storage_s3
              }]'

      - name: Provision PostgreSQL 18 and Redis 8
        if: inputs.operation == 'provision'
        env:
          PROJECT_UUID: ${{ inputs.project_uuid }}
          ENVIRONMENT_NAME: ${{ inputs.environment_name }}
          SERVER_UUID: ${{ inputs.server_uuid }}
        run: |
          test -n "${PROJECT_UUID}"
          test -n "${POSTGRES_PASSWORD}"
          test -n "${REDIS_PASSWORD}"
          [[ "${PROJECT_UUID}" =~ ^[a-z0-9]+$ ]]
          [[ "${ENVIRONMENT_NAME}" =~ ^[a-zA-Z0-9_-]+$ ]]

          coolify_request() {
            local method="$1"
            local path="$2"
            local payload="${3:-}"
            local args=(
              --fail-with-body
              --silent
              --show-error
              --connect-timeout 10
              --max-time 60
              -X "${method}"
              -H "Authorization: Bearer ${COOLIFY_TOKEN}"
              -H 'Content-Type: application/json'
            )
            if [[ -n "${payload}" ]]; then
              args+=(--data "${payload}")
            fi
            curl "${args[@]}" "${COOLIFY_URL%/}/api/v1/${path}"
          }

          databases="$(coolify_request GET databases)"
          postgres_uuid="$(jq -r '.[] | select(.name == "beping-postgresql-18") | .uuid' <<<"${databases}" | head -n1)"
          redis_uuid="$(jq -r '.[] | select(.name == "beping-redis-8") | .uuid' <<<"${databases}" | head -n1)"

          if [[ -z "${postgres_uuid}" ]]; then
            postgres_payload="$(
              jq -n \
                --arg project_uuid "${PROJECT_UUID}" \
                --arg environment_name "${ENVIRONMENT_NAME}" \
                --arg server_uuid "${SERVER_UUID}" \
                --arg password "${POSTGRES_PASSWORD}" \
                '{
                  project_uuid: $project_uuid,
                  environment_name: $environment_name,
                  server_uuid: $server_uuid,
                  name: "beping-postgresql-18",
                  description: "BePing PostgreSQL 18 blue-green migration target",
                  image: "postgres:18.4",
                  postgres_user: "beping",
                  postgres_password: $password,
                  postgres_db: "beping",
                  postgres_initdb_args: "--data-checksums",
                  is_public: false,
                  limits_memory: "1536m",
                  limits_memory_swap: "2048m",
                  limits_cpus: "1.25",
                  instant_deploy: true
                }'
            )"
            postgres_response="$(coolify_request POST databases/postgresql "${postgres_payload}")"
            postgres_uuid="$(jq -er '.uuid' <<<"${postgres_response}")"
          fi

          if [[ -z "${redis_uuid}" ]]; then
            redis_conf="$(printf '%s\n' 'appendonly yes' 'appendfsync everysec' 'save 900 1' 'save 300 10' 'save 60 10000' | base64 -w0)"
            redis_payload="$(
              jq -n \
                --arg project_uuid "${PROJECT_UUID}" \
                --arg environment_name "${ENVIRONMENT_NAME}" \
                --arg server_uuid "${SERVER_UUID}" \
                --arg password "${REDIS_PASSWORD}" \
                --arg redis_conf "${redis_conf}" \
                '{
                  project_uuid: $project_uuid,
                  environment_name: $environment_name,
                  server_uuid: $server_uuid,
                  name: "beping-redis-8",
                  description: "BePing Redis 8 blue-green migration target",
                  image: "redis:8.8.0-alpine",
                  redis_password: $password,
                  redis_conf: $redis_conf,
                  is_public: false,
                  limits_memory: "384m",
                  limits_memory_swap: "512m",
                  limits_cpus: "0.50",
                  instant_deploy: true
                }'
            )"
            redis_response="$(coolify_request POST databases/redis "${redis_payload}")"
            redis_uuid="$(jq -er '.uuid' <<<"${redis_response}")"
          fi

          [[ "${postgres_uuid}" =~ ^[a-z0-9]+$ ]]
          [[ "${redis_uuid}" =~ ^[a-z0-9]+$ ]]

          echo "PostgreSQL 18 UUID: ${postgres_uuid}"
          echo "Redis 8 UUID: ${redis_uuid}"
