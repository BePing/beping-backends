name: Deploy production

on:
  workflow_call:
    inputs:
      image_sha:
        description: Immutable 40-character git SHA published by the release workflow
        required: true
        type: string
  workflow_dispatch:
    inputs:
      image_sha:
        description: Immutable 40-character git SHA published by Containers or Release Please
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: beping-production
  cancel-in-progress: false

env:
  REGISTRY_HOST: ${{ vars.HETZNER_REGISTRY_HOST }}
  IMAGE_SHA: ${{ inputs.image_sha }}
  COOLIFY_URL: ${{ vars.COOLIFY_URL }}
  BEPING_DOCKER_HOST: ${{ vars.BEPING_DOCKER_HOST }}
  BEPING_BACKUP_DIRECTORY: /data/coolify/backups/postgresql/beping
  BEPING_BACKUP_MAX_AGE_MINUTES: 1560

jobs:
  deploy:
    name: Migrate and promote BePing
    runs-on: [self-hosted, linux, x64, escape-key-ci]
    environment: Production
    timeout-minutes: 45

    steps:
      - name: Checkout deployment tooling
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate deployment configuration
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          DATABASE_URL: ${{ secrets.BEPING_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.BEPING_DIRECT_URL }}
          REGISTRY_USERNAME: ${{ secrets.HETZNER_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.HETZNER_REGISTRY_PASSWORD }}
          API_UUID: ${{ vars.COOLIFY_BEPING_API_UUID }}
          NOTIFICATIONS_UUID: ${{ vars.COOLIFY_BEPING_NOTIFICATIONS_UUID }}
          IMPORTER_UUID: ${{ vars.COOLIFY_BEPING_IMPORTER_UUID }}
        run: |
          [[ "${IMAGE_SHA}" =~ ^[0-9a-f]{40}$ ]]
          test -n "${REGISTRY_HOST}"
          test -n "${REGISTRY_USERNAME}"
          test -n "${REGISTRY_PASSWORD}"
          test -n "${COOLIFY_URL}"
          test -n "${COOLIFY_TOKEN}"
          test -n "${BEPING_DOCKER_HOST}"
          test -n "${DATABASE_URL}"
          test -n "${DIRECT_URL}"
          test -n "${API_UUID}"
          test -n "${NOTIFICATIONS_UUID}"
          test -n "${IMPORTER_UUID}"

      - name: Log in to Escape Key registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.HETZNER_REGISTRY_USERNAME }}
          password: ${{ secrets.HETZNER_REGISTRY_PASSWORD }}

      - name: Verify immutable images
        run: |
          for image in beping-api beping-notifications beping-importer beping-migrate; do
            docker manifest inspect \
              "${REGISTRY_HOST}/escape-key/${image}:${IMAGE_SHA}" >/dev/null
          done

      - name: Verify recent PostgreSQL backup
        run: |
          docker_ssh_target="${BEPING_DOCKER_HOST#ssh://}"
          [[ "${BEPING_DOCKER_HOST}" == "ssh://${docker_ssh_target}" ]]
          [[ "${docker_ssh_target}" =~ ^root@[a-zA-Z0-9.-]+$ ]]

          # Refuse a stateful deployment unless the BePing host has a local,
          # non-empty PostgreSQL dump from the last 26 hours. Off-site backup
          # and periodic restore validation remain configured in Coolify.
          ssh \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            "${docker_ssh_target}" \
            "find '${BEPING_BACKUP_DIRECTORY}' -maxdepth 1 -type f -name '*.dump' -size +1048576c -mmin -${BEPING_BACKUP_MAX_AGE_MINUTES} -print -quit" \
            | grep -q .

      - name: Pause importer before migration
        id: pause_importer
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          IMPORTER_UUID: ${{ vars.COOLIFY_BEPING_IMPORTER_UUID }}
        run: |
          if ! docker --host "${BEPING_DOCKER_HOST}" ps \
            --filter "name=${IMPORTER_UUID}" \
            --format '{{.ID}}' | grep -q .; then
            echo "Importer is already stopped."
            echo "was_running=false" >>"${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "was_running=true" >>"${GITHUB_OUTPUT}"
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            "${COOLIFY_URL%/}/api/v1/applications/${IMPORTER_UUID}/stop" \
            >/dev/null

          for _ in $(seq 1 30); do
            if ! docker --host "${BEPING_DOCKER_HOST}" ps \
              --filter "name=${IMPORTER_UUID}" \
              --format '{{.ID}}' | grep -q .; then
              echo "Importer stopped before migration."
              exit 0
            fi
            sleep 2
          done

          echo "Timed out waiting for the importer to stop." >&2
          exit 1

      - name: Apply backward-compatible database migrations
        env:
          DATABASE_URL: ${{ secrets.BEPING_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.BEPING_DIRECT_URL }}
        run: |
          # The database is private to the BePing Coolify network. The Escape
          # Key runner reaches that Docker daemon over Tailscale SSH, so the
          # migration never requires a public PostgreSQL port.
          docker --host "${BEPING_DOCKER_HOST}" run --rm --pull always \
            --network coolify \
            -e DATABASE_URL \
            -e DIRECT_URL \
            "${REGISTRY_HOST}/escape-key/beping-migrate:${IMAGE_SHA}"

          # migrate deploy applies pending migrations but does not detect every
          # history mismatch. A separate status check fails on pending, failed
          # or divergent migrations before any application is promoted.
          docker --host "${BEPING_DOCKER_HOST}" run --rm --pull always \
            --network coolify \
            -e DATABASE_URL \
            -e DIRECT_URL \
            "${REGISTRY_HOST}/escape-key/beping-migrate:${IMAGE_SHA}" \
            pnpm exec prisma migrate status --schema prisma/schema.prisma

      - name: Deploy API with rolling update
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          bash scripts/coolify-deploy-image.sh \
            "${{ vars.COOLIFY_BEPING_API_UUID }}" \
            "${REGISTRY_HOST}/escape-key/beping-api" \
            "${IMAGE_SHA}" \
            "https://api-v2.beping.be/v1/health/ready"

      - name: Deploy notifications with rolling update
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          bash scripts/coolify-deploy-image.sh \
            "${{ vars.COOLIFY_BEPING_NOTIFICATIONS_UUID }}" \
            "${REGISTRY_HOST}/escape-key/beping-notifications" \
            "${IMAGE_SHA}" \
            "https://notifications.beping.be/health/ready"

      - name: Deploy importer
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          bash scripts/coolify-deploy-image.sh \
            "${{ vars.COOLIFY_BEPING_IMPORTER_UUID }}" \
            "${REGISTRY_HOST}/escape-key/beping-importer" \
            "${IMAGE_SHA}"

      - name: Resume previous importer after failure
        if: >-
          ${{
            always() &&
            (failure() || cancelled()) &&
            steps.pause_importer.outputs.was_running == 'true'
          }}
        continue-on-error: true
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          IMPORTER_UUID: ${{ vars.COOLIFY_BEPING_IMPORTER_UUID }}
        run: |
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            "${COOLIFY_URL%/}/api/v1/applications/${IMPORTER_UUID}/start" \
            >/dev/null
